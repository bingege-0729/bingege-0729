name: metrics
on:
    schedule:
      - cron: "17 3 * * *"   # UTC 03:17 ≈ 北京时间 11:17，避开整点
    workflow_dispatch:        # 允许手动触发立刻刷新

permissions:
    contents: main           # 推到 metrics 分支用
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: header
          config_timezone: Asia/Shanghai
          plugin_languages: yes
          plugin_languages_details: yes
          plugin_languages_sections: most used, recently used, history
          plugin_languages_limit: 8
          plugin_languages_ignored: ""          # 不过滤仓库
          plugin_languages_individual: yes       # 是否每个仓库独立一页
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
