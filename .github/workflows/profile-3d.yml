name: Generate 3D Contrib

on:
  # 每天自动运行一次 (UTC时间 00:00，即北京时间早上8点)
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yuzutech/github-profile-3d-contrib@latest # 注意：原作者仓库可能已归档，这里使用社区维护的兼容版本或原版
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: bingege-0729
      # 自动提交生成的图片到仓库
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: update 3d contrib graph" || exit 0
          git push
