name: Generate 3D Contrib

on:
  # 每天自动运行一次
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib

    steps:
      # 1. 拉取代码 (使用 v4，忽略那个 Node.js 警告，它不影响运行)
      - uses: actions/checkout@v4

      # 2. 运行生成脚本
      - name: GitHub-Profile-3D-Contrib
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: "bingege-0729"

      # 3. 提交更改 (这是最容易出错的地方，请使用下面这段标准的提交代码)
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 如果没有任何更改，git commit 会失败，所以我们在后面加了 || exit 0 来忽略这种“没有更改”的错误
          git commit -m "chore: update 3d contrib images" || exit 0
          git push
